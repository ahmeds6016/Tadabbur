<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="#10b981"/>

  <!-- White circle background for letter -->
  <circle cx="256" cy="256" r="180" fill="white" opacity="0.95"/>

  <!-- Letter T for Tafsir in Emerald -->
  <text x="256" y="320"
        font-family="Arial, sans-serif"
        font-size="240"
        font-weight="bold"
        text-anchor="middle"
        fill="#10b981">T</text>

  <!-- Optional: Arabic character ت (ta) -->
  <text x="256" y="380"
        font-family="Arial, sans-serif"
        font-size="48"
        text-anchor="middle"
        fill="#059669"
        opacity="0.8">تفسير</text>
</svg>