<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tafsir Simplified</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Tafsir Simplified</h1>

  <div id="profile-section">
    <h2>Set Your Level</h2>
    <select id="level-select">
      <option value="beginner">Beginner</option>
      <option value="intermediate">Intermediate</option>
      <option value="advanced">Advanced</option>
    </select>
    <button id="save-profile">Save Profile</button>
  </div>

  <div id="tafsir-section">
    <h2>Ask a Question</h2>
    <textarea id="query" placeholder="Enter your question..."></textarea>
    <button id="ask-tafsir">Submit</button>
    <pre id="tafsir-result"></pre>
  </div>

  <script src="app.js"></script>
</body>
</html>
